<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCS Tahmin Modeli</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .input-field {
      background: #0f172a; border: 1px solid #475569; color: #f1f5f9;
      border-radius: 6px; padding: 8px 12px; width: 100%;
      transition: border-color .2s;
    }
    .input-field:focus { outline: none; border-color: #38bdf8; }
    .input-field::placeholder { color: #64748b; }
    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white; border: none; border-radius: 8px;
      padding: 12px 28px; cursor: pointer; font-weight: 600;
      font-size: 15px; transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .tab-btn { padding: 10px 20px; border-radius: 8px 8px 0 0; font-weight: 500; cursor: pointer; transition: background .15s; }
    .tab-active { background: #1e293b; color: #38bdf8; border-bottom: 2px solid #38bdf8; }
    .tab-inactive { background: transparent; color: #64748b; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card { border: 1px solid; }
    .fade-in { animation: fadeIn .4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const API = window.location.hostname === "localhost"
  ? "http://localhost:8000"
  : "https://ucs-backend-ccn4.onrender.com";

/* ── V1 sabitler ────────────────────────────────────────── */
const ROCK_HINTS = {
  Granit:    { Vp:"4.5–6.5", n:"0.5–3.0", rho:"2.60–2.80", Rn:"50–65", Is50:"5–12" },
  Kirectasi: { Vp:"3.0–5.5", n:"2–12",    rho:"2.40–2.70", Rn:"35–55", Is50:"2–7"  },
  Kumtasi:   { Vp:"2.5–4.5", n:"8–25",    rho:"2.20–2.55", Rn:"25–45", Is50:"1–5"  },
};
const FREE_HINTS = { Vp:"2.5–6.5", n:"0.5–25", rho:"2.20–2.80", Rn:"25–65", Is50:"1–12" };
const FREE_EMPTY = { Vp:"", n:"", rho:"", Rn:"", Is50:"" };
const V1_FIELDS = [
  { key:"Vp",   label:"P-Dalga Hızı",        unit:"km/s",  step:0.1,  min:1,   max:8   },
  { key:"n",    label:"Gözeneklilik",          unit:"%",     step:0.1,  min:0.1, max:35  },
  { key:"rho",  label:"Yoğunluk",             unit:"g/cm³", step:0.01, min:1.5, max:3.5 },
  { key:"Rn",   label:"Schmidt Çekici (Rn)",  unit:"",      step:1,    min:10,  max:80  },
  { key:"Is50", label:"Nokta Yükleme (Is50)", unit:"MPa",   step:0.1,  min:0.1, max:20  },
];
const DEFAULTS = {
  Granit:    { Vp:5.5,  n:1.5,  rho:2.72, Rn:57, Is50:9.0 },
  Kirectasi: { Vp:4.2,  n:7.0,  rho:2.55, Rn:45, Is50:4.5 },
  Kumtasi:   { Vp:3.3,  n:16.0, rho:2.35, Rn:35, Is50:2.5 },
};

/* ── Kaya renk paleti (CSS gradient) ───────────────────── */
const ROCK_COLORS = {
  "Granit":    ["#5a5a5a", "#1e1e1e"],
  "Kirectasi": ["#b8b8a8", "#787868"],
  "Kumtasi":   ["#c89050", "#7a4e20"],
  "Kireçtaşı": ["#b8b8a8", "#787868"],
  "Kumtaşı":   ["#c89050", "#7a4e20"],
  "Claystone": ["#a85030", "#601810"],
  "Dolomit":   ["#6888a0", "#304858"],
  "Marl":      ["#788050", "#404818"],
  "Slate":     ["#384858", "#101820"],
  "Travertine":["#c8b060", "#806820"],
  "Şist":      ["#686878", "#282838"],
};

function RockSwatch({ name, size }) {
  const [c1, c2] = ROCK_COLORS[name] || ["#475569", "#1e293b"];
  const bg = `linear-gradient(145deg, ${c1}, ${c2})`;
  const shadow = `0 2px 10px ${c2}aa`;
  if (size === "dot") {
    return <div style={{ background: bg, width:18, height:18, borderRadius:999, flexShrink:0 }} />;
  }
  return (
    <div style={{
      background: bg, boxShadow: shadow,
      width:52, height:52, borderRadius:10, flexShrink:0,
      border:"2px solid rgba(255,255,255,0.08)",
    }} />
  );
}

/* ── V2 sabitler ────────────────────────────────────────── */
const V2_FIELDS = [
  { key:"vp_ms", label:"P-Dalga Hızı",         unit:"m/s", step:10,  min:500,  max:10000 },
  { key:"n",     label:"Gözeneklilik",           unit:"%",  step:0.1, min:0.01, max:35    },
  { key:"shr",   label:"Schmidt Çekici (SHR)", unit:"",   step:1,   min:10,   max:80    },
  { key:"is50",  label:"Nokta Yükleme (Is50)", unit:"MPa", step:0.1, min:0.1,  max:20    },
];
const V2_EMPTY = { vp_ms:"", n:"", shr:"", is50:"" };

function isrmColor(sinif) {
  if (sinif.startsWith("Çok Zayıf"))  return "text-slate-400";
  if (sinif.startsWith("Zayıf"))      return "text-blue-400";
  if (sinif.startsWith("Orta"))       return "text-yellow-400";
  if (sinif.startsWith("Dayanımlı")
    && !sinif.startsWith("Çok D"))    return "text-orange-400";
  return "text-red-400";
}

/* ── Ortak bileşenler ───────────────────────────────────── */
function GuvenBadge({ guven }) {
  const style = guven === "Yuksek"
    ? "bg-emerald-900 text-emerald-300"
    : guven === "Orta"
    ? "bg-yellow-900 text-yellow-300"
    : "bg-red-900 text-red-300";
  return <span className={`badge ${style}`}>{guven} Güven</span>;
}

function UCSBar({ label, value, max=300, color }) {
  const pct = Math.min((value / max) * 100, 100);
  return (
    <div className="mb-3">
      <div className="flex justify-between text-sm mb-1">
        <span className="text-slate-400">{label}</span>
        <span className="font-bold text-slate-200">{value.toFixed(1)} MPa</span>
      </div>
      <div className="w-full h-3 rounded-full bg-slate-700">
        <div className="h-3 rounded-full transition-all duration-700"
             style={{ width:`${pct}%`, background:color }} />
      </div>
    </div>
  );
}

function Spinner() {
  return (
    <svg className="spin w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
      <circle cx="12" cy="12" r="10" strokeOpacity=".25"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"/>
    </svg>
  );
}

/* ── Ana bileşen ────────────────────────────────────────── */
function App() {
  /* ── Ortak state ── */
  const [tab, setTab] = React.useState("single");
  const [apiOk, setApiOk] = React.useState(null);

  /* ── V1 state ── */
  const [inputMode, setInputMode] = React.useState("free");
  const [rockType, setRockType] = React.useState("Granit");
  const [form, setForm] = React.useState({ ...FREE_EMPTY });
  const [loading, setLoading] = React.useState(false);
  const [shapLoading, setShapLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [shapImg, setShapImg] = React.useState(null);
  const [error, setError] = React.useState(null);

  /* ── V2 state ── */
  const [v2Mode, setV2Mode] = React.useState("none"); // "none" | "typed"
  const [kayaTurleri, setKayaTurleri] = React.useState([]);
  const [v2RockType, setV2RockType] = React.useState("");
  const [v2Form, setV2Form] = React.useState({ ...V2_EMPTY });
  const [v2Loading, setV2Loading] = React.useState(false);
  const [v2Result, setV2Result] = React.useState(null);
  const [v2Error, setV2Error] = React.useState(null);

  /* ── Batch state ── */
  const csvInputRef = React.useRef(null);
  const [csvLoading, setCsvLoading] = React.useState(false);
  const [csvRows, setCsvRows] = React.useState(null);
  const [csvError, setCsvError] = React.useState(null);

  React.useEffect(() => {
    let attempts = 0;
    const MAX = 10;
    const INTERVAL = 7000; // 7 sn arayla, toplamda ~70 sn dener
    function checkHealth() {
      fetch(`${API}/health`, { signal: AbortSignal.timeout(6000) })
        .then(r => r.json())
        .then(d => {
          if (d.status === "ok" && d.models_loaded) {
            setApiOk(true);
          } else {
            throw new Error("not ready");
          }
        })
        .catch(() => {
          attempts++;
          if (attempts < MAX) {
            setApiOk("waking");
            setTimeout(checkHealth, INTERVAL);
          } else {
            setApiOk(false);
          }
        });
    }
    checkHealth();
    fetch(`${API}/v2/kaya-turleri`)
      .then(r => r.json())
      .then(d => {
        setKayaTurleri(d.kaya_turleri);
        if (d.kaya_turleri.length) setV2RockType(d.kaya_turleri[0]);
      })
      .catch(() => {});
  }, []);

  /* ── V1 handlers ── */
  const handleModeChange = (mode) => {
    setInputMode(mode);
    setResult(null); setShapImg(null); setError(null);
    setForm(mode === "free" ? { ...FREE_EMPTY } : { ...DEFAULTS[rockType] });
  };
  const handleRockChange = (rt) => {
    setRockType(rt);
    setForm({ ...DEFAULTS[rt] });
    setResult(null); setShapImg(null); setError(null);
  };
  const handleChange = (key, val) => setForm(f => ({ ...f, [key]: val }));
  const formAsFloats = () => {
    const out = {};
    for (const f of V1_FIELDS) {
      const v = parseFloat(form[f.key]);
      if (isNaN(v)) return null;
      out[f.key] = v;
    }
    return out;
  };
  const allFilled = V1_FIELDS.every(f => form[f.key] !== "" && !isNaN(parseFloat(form[f.key])));

  const handlePredict = async () => {
    const payload = formAsFloats();
    if (!payload) { setError("Lütfen tüm parametreleri doldurun."); return; }
    setLoading(true); setError(null); setResult(null); setShapImg(null);
    try {
      const res = await fetch(`${API}/predict`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "API hatası"); }
      const data = await res.json();
      setResult(data);
      setShapLoading(true);
      const sres = await fetch(`${API}/predict-shap`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (sres.ok) { const sd = await sres.json(); setShapImg(sd.image); }
    } catch (e) {
      setError(e.message || "Bağlantı hatası. Backend çalışıyor mu?");
    } finally { setLoading(false); setShapLoading(false); }
  };

  /* ── V2 handlers ── */
  const handleV2Change = (key, val) => setV2Form(f => ({ ...f, [key]: val }));
  const handleV2ModeChange = (mode) => {
    setV2Mode(mode); setV2Result(null); setV2Error(null);
  };
  const v2AllFilled = V2_FIELDS.every(f => v2Form[f.key] !== "" && !isNaN(parseFloat(v2Form[f.key])));

  const handleV2Predict = async () => {
    const payload = {};
    for (const f of V2_FIELDS) {
      const v = parseFloat(v2Form[f.key]);
      if (isNaN(v)) { setV2Error("Lütfen tüm parametreleri doldurun."); return; }
      payload[f.key] = v;
    }
    if (v2Mode === "typed") payload.rock_type = v2RockType;
    setV2Loading(true); setV2Error(null); setV2Result(null);
    try {
      const res = await fetch(`${API}/v2/predict`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "API hatası"); }
      setV2Result(await res.json());
    } catch (e) {
      setV2Error(e.message || "Bağlantı hatası.");
    } finally { setV2Loading(false); }
  };

  /* ── Batch handlers ── */
  const handleCsvPredict = async () => {
    const f = csvInputRef.current?.files?.[0];
    if (!f) { setCsvError("Lütfen bir CSV veya Excel dosyası seçin."); return; }
    setCsvLoading(true); setCsvError(null); setCsvRows(null);
    try {
      const fd = new FormData();
      fd.append("file", f);
      const res = await fetch(`${API}/v2/predict-batch`, { method: "POST", body: fd });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setCsvRows(data.sonuclar);
    } catch (e) {
      setCsvError(e.message || "Bağlantı hatası.");
    } finally { setCsvLoading(false); }
  };

  const handleCsvDownload = () => {
    if (!csvRows) return;
    const BOM = "﻿";
    const cols = ["Vp_ms","n","SHR","Is50","RockType","UCS_Tahmin","ISRM_Sinifi","Model"];
    let csv = BOM + cols.join(";") + "\r\n";
    csvRows.forEach(r => {
      csv += cols.map(c => r[c] ?? "").join(";") + "\r\n";
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
    a.download = "ucs_tahmin_sonuclari.csv";
    a.click();
  };

  const handleTemplateDownload = () => {
    const BOM = "﻿";
    const satirlar = [
      "Vp_ms;n;SHR;Is50;RockType",
      "5500;0.5;57;8.0;Granit",
      "4200;7.5;46;4.5;Kireçtaşı",
      "3000;15.0;32;2.2;Kumtaşı",
      "5800;0.3;60;9.5;",
      "4800;3.0;50;5.0;",
    ];
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([BOM + satirlar.join("\r\n")], { type: "text/csv;charset=utf-8" }));
    a.download = "ucs_sablon.csv";
    a.click();
  };

  const hints = inputMode === "free" ? FREE_HINTS : ROCK_HINTS[rockType];
  const subtitle = tab === "single"
    ? "Kaya Dayanımı Tahmini — XGBoost + Linear Ensemble"
    : tab === "v2"
    ? "Gerçek Veri Modeli — SVR, 224 Saha Ölçümü"
    : "CSV / Excel Toplu Tahmin — v2 Modeli";

  return (
    <div className="min-h-screen p-4 md:p-8">

      {/* Header */}
      <div className="max-w-5xl mx-auto mb-8">
        <div className="flex items-center gap-3 mb-1">
          <div className="w-10 h-10 rounded-lg flex items-center justify-center text-2xl"
               style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)"}}>
            ⛏
          </div>
          <div>
            <h1 className="text-2xl font-bold text-slate-100">UCS Tahmin Modeli</h1>
            <p className="text-slate-400 text-sm">{subtitle}</p>
          </div>
          <div className="ml-auto">
            {apiOk === null   && <span className="text-slate-500 text-sm">API kontrol ediliyor…</span>}
            {apiOk === "waking" && (
              <span className="badge bg-amber-900 text-amber-300 flex items-center gap-1.5">
                <Spinner /> Sunucu Uyandırılıyor…
              </span>
            )}
            {apiOk === true   && <span className="badge bg-emerald-900 text-emerald-300">API Bağlı</span>}
            {apiOk === false  && <span className="badge bg-red-900 text-red-300">API Bağlantı Yok</span>}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="max-w-5xl mx-auto mb-0 flex gap-1 border-b border-slate-700">
        <button
          className={`tab-btn ${tab === "single" ? "tab-active" : "tab-inactive"}`}
          onClick={() => setTab("single")}
        >
          Tek Numune Tahmini (v1)
        </button>
        <button
          className={`tab-btn ${tab === "v2" ? "tab-active" : "tab-inactive"}`}
          onClick={() => setTab("v2")}
        >
          Gerçek Veri Modeli (v2)
        </button>
        <button
          className={`tab-btn ${tab === "batch" ? "tab-active" : "tab-inactive"}`}
          onClick={() => setTab("batch")}
        >
          CSV / Excel Toplu Tahmin
        </button>
      </div>

      {/* Panel */}
      <div className="max-w-5xl mx-auto">
        <div className="card rounded-b-xl rounded-tr-xl p-6">

          {/* ══════════ V1 TAB ══════════ */}
          {tab === "single" && (<>

            {/* Mod seçici */}
            <div className="flex gap-2 mb-6 p-1 rounded-xl bg-slate-900 w-fit">
              <button
                onClick={() => handleModeChange("free")}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all
                  ${inputMode === "free" ? "bg-violet-600 text-white shadow" : "text-slate-400 hover:text-slate-200"}`}
              >
                ✏️ Serbest Değer Girişi
              </button>
              <button
                onClick={() => handleModeChange("preset")}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all
                  ${inputMode === "preset" ? "bg-sky-600 text-white shadow" : "text-slate-400 hover:text-slate-200"}`}
              >
                🪨 Kaya Tipinden Başla
              </button>
            </div>

            {inputMode === "preset" && (
              <div className="mb-6">
                <label className="text-slate-300 text-sm font-semibold mb-2 block">Kaya Tipi</label>
                <div className="flex gap-3">
                  {[
                    { key:"Granit",    label:"Granit",    desc:"Magmatik · 100–250 MPa" },
                    { key:"Kirectasi", label:"Kireçtaşı", desc:"Sedimanter · 30–150 MPa" },
                    { key:"Kumtasi",   label:"Kumtaşı",   desc:"Sedimanter · 20–100 MPa" },
                  ].map(({ key, label, desc }) => (
                    <button key={key} onClick={() => handleRockChange(key)}
                      className={`flex-1 rounded-xl transition-all border flex flex-col items-center gap-3 py-4 px-2
                        ${rockType === key
                          ? "border-sky-500 bg-sky-950"
                          : "border-slate-700 bg-slate-800 hover:border-slate-500"}`}>
                      <RockSwatch name={key} size="lg" />
                      <div className="text-center">
                        <div className={`font-semibold text-sm ${rockType === key ? "text-sky-300" : "text-slate-300"}`}>{label}</div>
                        <div className="text-slate-500 text-xs mt-0.5">{desc}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {inputMode === "free" && (
              <div className="mb-5 px-4 py-3 rounded-lg bg-violet-950 border border-violet-800 text-violet-300 text-sm">
                Saha ölçümlerinizi doğrudan girin. Kaya tipi seçimi gerekmez — model sadece 5 fiziksel parametreyi kullanır.
              </div>
            )}

            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
              {V1_FIELDS.map(f => {
                const val = form[f.key];
                const isInvalid = val !== "" && val !== undefined && isNaN(parseFloat(val));
                return (
                  <div key={f.key}>
                    <label className="text-slate-400 text-xs font-medium mb-1 flex justify-between">
                      <span>{f.label}{f.unit ? ` (${f.unit})` : ""}</span>
                      <span className="text-slate-600">{hints[f.key]}</span>
                    </label>
                    <input type="number" step={f.step} min={f.min} max={f.max} value={val}
                      placeholder={inputMode === "free" ? `ör. ${hints[f.key].split("–")[0]}` : ""}
                      className={`input-field ${isInvalid ? "border-red-500" : ""}`}
                      onChange={e => handleChange(f.key, e.target.value)} />
                  </div>
                );
              })}
            </div>

            <div className="flex justify-center mb-6">
              <button className="btn-primary flex items-center gap-2"
                onClick={handlePredict}
                disabled={loading || apiOk === false || !allFilled}
                title={!allFilled ? "Tüm alanları doldurun" : ""}>
                {loading ? <><Spinner /> Hesaplanıyor…</> : "⚡ UCS Tahmin Et"}
              </button>
            </div>

            {error && (
              <div className="bg-red-950 border border-red-700 text-red-300 rounded-lg p-4 mb-4 text-sm fade-in">
                {error}
              </div>
            )}

            {result && (
              <div className="fade-in">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="card rounded-xl p-5">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-slate-200 font-semibold">Tahmin Sonuçları</h3>
                      <GuvenBadge guven={result.guven} />
                    </div>
                    <div className="text-center my-4">
                      <div className="text-5xl font-bold text-sky-400">{result.ucs_ortalama.toFixed(1)}</div>
                      <div className="text-slate-400 text-sm mt-1">MPa (Ortalama)</div>
                    </div>
                    <div className="mt-4">
                      <UCSBar label="XGBoost" value={result.ucs_xgboost} color="#10b981" max={280} />
                      <UCSBar label="Linear Regresyon" value={result.ucs_linear} color="#8b5cf6" max={280} />
                      <UCSBar label="Ensemble Ortalama" value={result.ucs_ortalama} color="#0ea5e9" max={280} />
                    </div>
                    <div className="mt-4 pt-4 border-t border-slate-700 flex items-center gap-2 text-slate-400 text-sm">
                      <span>🪨</span>
                      <span>Tahmini kaya tipi: <span className="text-slate-200 font-medium">{result.kaya_tipi_tahmin}</span></span>
                    </div>
                    <div className="mt-3">
                      {(() => {
                        const v = result.ucs_ortalama;
                        let cls, color;
                        if (v > 250)      { cls = "Çok Dayanımlı (R5)";  color = "text-red-400"; }
                        else if (v > 100) { cls = "Dayanımlı (R4)";       color = "text-orange-400"; }
                        else if (v > 50)  { cls = "Orta Dayanımlı (R3)"; color = "text-yellow-400"; }
                        else if (v > 25)  { cls = "Zayıf (R2)";           color = "text-blue-400"; }
                        else              { cls = "Çok Zayıf (R1)";       color = "text-slate-400"; }
                        return <div className={`text-xs font-semibold ${color} text-center mt-2`}>ISRM Sınıfı: {cls}</div>;
                      })()}
                    </div>
                  </div>

                  <div className="card rounded-xl p-5">
                    <h3 className="text-slate-200 font-semibold mb-3">Parametre Etkileri (SHAP)</h3>
                    {shapLoading && (
                      <div className="flex items-center justify-center h-40 text-slate-500 text-sm gap-2">
                        <Spinner /> SHAP hesaplanıyor…
                      </div>
                    )}
                    {shapImg && !shapLoading && <img src={shapImg} alt="SHAP" className="w-full rounded-lg" />}
                    {!shapImg && !shapLoading && <p className="text-slate-500 text-sm text-center py-8">SHAP grafik yüklenemedi.</p>}
                  </div>
                </div>

                <div className="card rounded-xl p-4 mt-4">
                  <h4 className="text-slate-400 text-xs font-semibold mb-3">Girilen Parametreler</h4>
                  <div className="grid grid-cols-5 gap-2">
                    {V1_FIELDS.map(f => (
                      <div key={f.key} className="text-center">
                        <div className="text-slate-500 text-xs">{f.key}</div>
                        <div className="text-slate-200 font-semibold text-sm">
                          {form[f.key] !== "" ? parseFloat(form[f.key]) : "—"}
                        </div>
                        <div className="text-slate-600 text-xs">{f.unit}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </>)}

          {/* ══════════ BATCH TAB ══════════ */}
          {tab === "batch" && (<>

            <div className="mb-5 px-4 py-3 rounded-lg bg-sky-950 border border-sky-800 text-sky-300 text-sm">
              <span className="font-semibold">CSV veya Excel dosyanızı yükleyin.</span>{" "}
              Gerekli sütunlar: <span className="font-mono font-semibold">Vp_ms, n, SHR, Is50</span>.
              Opsiyonel: <span className="font-mono font-semibold">RockType</span> — doluysa v2b (kaya türlü), boşsa v2a (türsüz) kullanılır.
              <button
                onClick={handleTemplateDownload}
                className="ml-3 px-3 py-1 rounded text-xs font-semibold bg-sky-800 hover:bg-sky-700 text-sky-100 transition-colors"
              >
                Örnek Şablon İndir
              </button>
            </div>

            {/* Dosya yükleme */}
            <div className="flex items-center gap-4 mb-6">
              <label className="flex-1 flex items-center gap-3 px-4 py-5 rounded-xl border-2 border-dashed border-slate-600 hover:border-sky-500 cursor-pointer transition-colors bg-slate-900">
                <span className="text-2xl">📂</span>
                <div>
                  <div className="text-slate-300 text-sm font-medium">CSV veya Excel dosyası seç</div>
                  <div className="text-slate-500 text-xs mt-0.5">.csv · .xlsx · .xls</div>
                </div>
                <input
                  ref={csvInputRef}
                  type="file"
                  accept=".csv,.xlsx,.xls"
                  className="hidden"
                  onChange={() => { setCsvRows(null); setCsvError(null); }}
                />
              </label>
              <button
                className="btn-primary flex items-center gap-2 whitespace-nowrap"
                onClick={handleCsvPredict}
                disabled={csvLoading || apiOk === false}
              >
                {csvLoading ? <><Spinner /> Tahmin yapılıyor…</> : "⚡ Toplu Tahmin Yap"}
              </button>
            </div>

            {csvError && (
              <div className="bg-red-950 border border-red-700 text-red-300 rounded-lg p-4 mb-4 text-sm fade-in">
                {csvError}
              </div>
            )}

            {csvRows && (
              <div className="fade-in">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-slate-300 text-sm font-semibold">{csvRows.length} satır tahmin edildi</span>
                  <button
                    onClick={handleCsvDownload}
                    className="px-4 py-2 rounded-lg text-sm font-semibold bg-emerald-800 hover:bg-emerald-700 text-emerald-100 transition-colors"
                  >
                    Sonuçları İndir (CSV)
                  </button>
                </div>
                <div className="overflow-x-auto rounded-xl border border-slate-700">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-slate-900 text-slate-400 text-xs uppercase">
                        {["Vp (m/s)","n (%)","SHR","Is50","Kaya Türü","UCS Tahmin (MPa)","ISRM Sınıfı","Model"].map(h => (
                          <th key={h} className="px-3 py-2 text-left font-semibold whitespace-nowrap">{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {csvRows.map((r, i) => (
                        <tr key={i} className={`border-t border-slate-700 ${i % 2 === 0 ? "bg-slate-800" : "bg-slate-850"} hover:bg-slate-700 transition-colors`}>
                          <td className="px-3 py-2 text-slate-300">{r.Vp_ms}</td>
                          <td className="px-3 py-2 text-slate-300">{r.n}</td>
                          <td className="px-3 py-2 text-slate-300">{r.SHR}</td>
                          <td className="px-3 py-2 text-slate-300">{r.Is50}</td>
                          <td className="px-3 py-2 text-slate-400">{r.RockType}</td>
                          <td className="px-3 py-2">
                            {r.UCS_Tahmin != null
                              ? <span className="font-bold text-sky-400">{r.UCS_Tahmin}</span>
                              : <span className="text-red-400">HATA</span>}
                          </td>
                          <td className={`px-3 py-2 font-medium text-xs ${isrmColor(r.ISRM_Sinifi)}`}>{r.ISRM_Sinifi}</td>
                          <td className="px-3 py-2 text-slate-500 text-xs font-mono">{r.Model}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </>)}

          {/* ══════════ V2 TAB ══════════ */}
          {tab === "v2" && (<>

            {/* Açıklama */}
            <div className="mb-5 px-4 py-3 rounded-lg bg-sky-950 border border-sky-800 text-sky-300 text-sm">
              <span className="font-semibold">Gerçek Veri Modeli:</span> 224 gerçek saha ölçümüyle eğitilmiş SVR modeli.
              Yoğunluk (rho) parametresi bu modelde kullanılmaz. P-dalga hızını <span className="font-semibold">m/s</span> cinsinden girin.
            </div>

            {/* Mod seçici */}
            <div className="flex gap-2 mb-6 p-1 rounded-xl bg-slate-900 w-fit">
              <button
                onClick={() => handleV2ModeChange("none")}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all
                  ${v2Mode === "none" ? "bg-violet-600 text-white shadow" : "text-slate-400 hover:text-slate-200"}`}
              >
                ✏️ Türsüz (v2a)
              </button>
              <button
                onClick={() => handleV2ModeChange("typed")}
                className={`px-4 py-2 rounded-lg text-sm font-semibold transition-all flex items-center gap-2
                  ${v2Mode === "typed" ? "bg-sky-600 text-white shadow" : "text-slate-400 hover:text-slate-200"}`}
              >
                <div style={{width:14,height:14,borderRadius:4,background:"linear-gradient(135deg,#5a5a5a,#1e1e1e)",flexShrink:0}} />
                Kaya Türlü (v2b)
              </button>
            </div>

            {/* Model bilgisi */}
            <div className="mb-5 text-xs text-slate-500">
              {v2Mode === "none"
                ? "v2a · SVR RBF · CV R² = 0.70 · kaya türü gerekmez"
                : "v2b · SVR RBF + OneHot · CV R² = 0.86 · kaya türü seçimi gerekli"}
            </div>

            {/* Kaya türü dropdown (sadece typed modda) */}
            {v2Mode === "typed" && (
              <div className="mb-5">
                <label className="text-slate-300 text-sm font-semibold mb-2 block">Kaya Türü</label>
                {kayaTurleri.length > 0 ? (
                  <div className="flex items-center gap-3">
                    <RockSwatch name={v2RockType} size="lg" />
                    <div>
                      <select
                        className="input-field"
                        value={v2RockType}
                        onChange={e => setV2RockType(e.target.value)}
                        style={{maxWidth:"220px"}}
                      >
                        {kayaTurleri.map(kt => (
                          <option key={kt} value={kt}>{kt}</option>
                        ))}
                      </select>
                      <div className="text-slate-500 text-xs mt-1.5">Seçime göre renk güncellenir</div>
                    </div>
                  </div>
                ) : (
                  <span className="text-slate-500 text-sm">Kaya türleri yükleniyor…</span>
                )}
              </div>
            )}

            {/* Giriş alanları */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              {V2_FIELDS.map(f => {
                const val = v2Form[f.key];
                const isInvalid = val !== "" && val !== undefined && isNaN(parseFloat(val));
                return (
                  <div key={f.key}>
                    <label className="text-slate-400 text-xs font-medium mb-1 block">
                      {f.label}{f.unit ? ` (${f.unit})` : ""}
                    </label>
                    <input type="number" step={f.step} min={f.min} max={f.max} value={val}
                      placeholder={`ör. ${f.min}`}
                      className={`input-field ${isInvalid ? "border-red-500" : ""}`}
                      onChange={e => handleV2Change(f.key, e.target.value)} />
                  </div>
                );
              })}
            </div>

            <div className="flex justify-center mb-6">
              <button className="btn-primary flex items-center gap-2"
                onClick={handleV2Predict}
                disabled={v2Loading || apiOk === false || !v2AllFilled || (v2Mode === "typed" && !v2RockType)}
                title={!v2AllFilled ? "Tüm alanları doldurun" : ""}>
                {v2Loading ? <><Spinner /> Hesaplanıyor…</> : "⚡ UCS Tahmin Et"}
              </button>
            </div>

            {v2Error && (
              <div className="bg-red-950 border border-red-700 text-red-300 rounded-lg p-4 mb-4 text-sm fade-in">
                {v2Error}
              </div>
            )}

            {v2Result && (
              <div className="fade-in">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                  {/* Sonuç kartı */}
                  <div className="card rounded-xl p-5">
                    <h3 className="text-slate-200 font-semibold mb-4">Tahmin Sonucu</h3>

                    <div className="text-center my-4">
                      <div className="text-5xl font-bold text-sky-400">{v2Result.ucs_mpa.toFixed(1)}</div>
                      <div className="text-slate-400 text-sm mt-1">MPa</div>
                    </div>

                    <UCSBar label="UCS (SVR)" value={v2Result.ucs_mpa} color="#0ea5e9" max={280} />

                    <div className="mt-4 pt-4 border-t border-slate-700 space-y-2 text-sm">
                      <div className="flex justify-between">
                        <span className="text-slate-400">ISRM Sınıfı</span>
                        <span className={`font-semibold ${isrmColor(v2Result.isrm_sinifi)}`}>
                          {v2Result.isrm_sinifi}
                        </span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-slate-400">Model</span>
                        <span className="text-slate-200">{v2Result.model}</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-slate-400">CV R²</span>
                        <span className="text-slate-200">{v2Result.model_r2.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>

                  {/* Model bilgisi kartı */}
                  <div className="card rounded-xl p-5">
                    <h3 className="text-slate-200 font-semibold mb-3">Model Hakkında</h3>
                    <div className="space-y-3 text-sm text-slate-400">
                      <div className="flex gap-2">
                        <span className="text-sky-400 mt-0.5">▸</span>
                        <span>224 gerçek saha ölçümüyle eğitildi (Mishra 2013, Mahmoodzadeh 2021)</span>
                      </div>
                      <div className="flex gap-2">
                        <span className="text-sky-400 mt-0.5">▸</span>
                        <span>SVR RBF kernel (C=500, ε=0.1)</span>
                      </div>
                      <div className="flex gap-2">
                        <span className="text-sky-400 mt-0.5">▸</span>
                        <span>4 parametre: Vp (m/s), Gözeneklilik, SHR, Is50</span>
                      </div>
                      <div className="flex gap-2">
                        <span className="text-sky-400 mt-0.5">▸</span>
                        <span>Yoğunluk (rho) bu modelde kullanılmaz</span>
                      </div>
                      {v2Mode === "typed" && (
                        <div className="flex gap-2">
                          <span className="text-emerald-400 mt-0.5">▸</span>
                          <span>Kaya türü bilgisi dahil edildi — daha yüksek R² (0.86)</span>
                        </div>
                      )}
                    </div>

                    <div className="mt-4 pt-4 border-t border-slate-700">
                      <h4 className="text-slate-400 text-xs font-semibold mb-3">Girilen Değerler</h4>
                      <div className="grid grid-cols-2 gap-2">
                        {V2_FIELDS.map(f => (
                          <div key={f.key} className="flex justify-between text-xs">
                            <span className="text-slate-500">{f.label}</span>
                            <span className="text-slate-200 font-medium">
                              {v2Form[f.key] !== "" ? parseFloat(v2Form[f.key]) : "—"} {f.unit}
                            </span>
                          </div>
                        ))}
                        {v2Mode === "typed" && (
                          <div className="flex justify-between text-xs col-span-2">
                            <span className="text-slate-500">Kaya Türü</span>
                            <span className="text-slate-200 font-medium">{v2RockType}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

          </>)}

        </div>
      </div>

      <p className="text-center text-slate-700 text-xs mt-8">
        Eren İNAN · Bitirme Çalışması II · Mayıs 2026
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
